name: Native Build CI

on:
  workflow_dispatch:

jobs:
  build_and_test:
    name: Build and test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-15-intel is an intel runner, macos-latest is apple silicon
        # TEMP: restricted to windows-latest only while iterating on the Windows leg
        os: [windows-latest] # ubuntu-latest, macos-15-intel, macos-latest,

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # See INSTALL.md "Compilation from source" (Linux)
      - name: Install system dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ccache git \
            python3-dev libopenmpi-dev gfortran libblas-dev liblapack-dev \
            pybind11-dev libginac-dev libcln-dev libgmp-dev \
            libglu1-mesa libxcursor1 libopengl0

      # See INSTALL.md "Compilation from source" (Mac)
      - name: Install system dependencies (Mac)
        if: startsWith(matrix.os, 'macos')
        run: brew install openmpi ccache ginac pkg-config

      # Linux module list from INSTALL.md, minus petsc4py
      - name: Install Python build/test dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          python -m pip install --upgrade pip
          python -m pip install gmsh mpi4py matplotlib numpy pybind11 \
            pygmsh scipy meshio pybind11-stubgen scikit-build-core pytest

      # Mac module list from INSTALL.md; mkl version is resolved automatically
      # from the platform markers in pyproject.toml
      - name: Install Python build/test dependencies (Mac)
        if: startsWith(matrix.os, 'macos')
        run: |
          python -m pip install --upgrade pip
          python -m pip install pybind11 gmsh commonmark six pyparsing pygments pillow \
            numpy mpi4py kiwisolver fonttools cycler scipy rich python-dateutil packaging \
            meshio matplotlib pygmsh pybind11-stubgen scikit-build-core pytest

      - name: Build pyoomph
        if: startsWith(matrix.os, 'windows') != true
        run: bash ./build_for_develop.sh

      - name: Run self test
        if: startsWith(matrix.os, 'windows') != true
        run: cd tests/ && python -m pyoomph check all && python -m pytest *.py

      # Windows has no MSVC-compatible CLN/GiNaC build, so the whole thing -
      # CLN, GiNaC (both via CMake's own ExternalProject_Add, see
      # cmake/ThirdPartyGiNaC.cmake) and the _pyoomph_core extension - is
      # built from an MSYS2/MinGW-w64 shell instead, using the same
      # pip-install-e. path as Linux/Mac (see build_for_develop.sh), just
      # with the CMake generator forced off the runner's default MSVC/Visual
      # Studio detection. See the comment in pyproject.toml under
      # [tool.cibuildwheel.windows] for background - this is untested, since
      # nothing here has a Windows CI leg that currently passes.
      - uses: msys2/setup-msys2@v2
        if: startsWith(matrix.os, 'windows')
        with:
          msystem: UCRT64
          path-type: inherit
          update: true
          install: >-
            patch
            git
            base-devel
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-pkg-config

      - name: Install Python build/test dependencies (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: msys2 {0}
        run: |
          # MSYS2's own python.exe (no pip) otherwise shadows the
          # actions/setup-python one on PATH, even with path-type: inherit.
          export PATH="$(cygpath -u "$pythonLocation"):$PATH"
          python -m pip install --upgrade pip
          python -m pip install pybind11 gmsh matplotlib numpy \
            pygmsh scipy meshio pybind11-stubgen scikit-build-core pytest

      - name: Build pyoomph (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: msys2 {0}
        env:
          CC: gcc
          CXX: g++
        run: |
          export PATH="$(cygpath -u "$pythonLocation"):$PATH"
          python -m pip install --no-build-isolation -e . -v \
            --config-settings=build-dir=cmake_build \
            --config-settings=cmake.args=-G"Unix Makefiles" \
            --config-settings=cmake.define.PYOOMPH_USE_MPI=OFF \
            --config-settings=cmake.define.PYOOMPH_PARANOID=OFF

      - name: Run self test (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: msys2 {0}
        run: |
          export PATH="$(cygpath -u "$pythonLocation"):$PATH"
          cd tests/ && python -m pyoomph check all && python -m pytest *.py
