name: Test wheels across Python versions

# Downloads the wheels built by a Wheels workflow run (see wheels.yml) and installs +
# smoke-tests them on real Python 3.11, 3.12, 3.13, and 3.14 interpreters, on every
# platform built there. This exists specifically to verify the Stable ABI (abi3) story:
# 3.11 installs its own classic, version-specific wheel, while 3.12/3.13/3.14 all install
# the very same cp312-abi3 wheel file - if nanobind's Limited API build were somehow not
# truly forward-compatible, this would be the place that catches it, since the actual
# wheel build job only ever runs/tests the cp312-abi3 wheel under its own (3.12)
# interpreter.

on:
  workflow_dispatch:
    inputs:
      wheels_run_id:
        description: Wheels workflow run id to pull wheel artifacts from (defaults to the latest successful run)
        required: false
        type: string
  workflow_run:
    workflows:
      - Wheels
    types:
      - completed

jobs:
  test_wheel:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    name: ${{ matrix.os_entry.label }} / cp${{ matrix.python_version }}
    runs-on: ${{ matrix.os_entry.runner }}
    strategy:
      fail-fast: false
      matrix:
        os_entry:
          - label: linux-x86_64
            runner: ubuntu-latest
            artifact: wheels-linux-x86_64
          - label: macos-intel-x86_64
            runner: macos-15-intel
            artifact: wheels-macos-intel-x86_64
          - label: macos-arm64
            runner: macos-14
            artifact: wheels-macos-arm64
          - label: windows-msys2-ucrt64
            runner: windows-latest
            artifact: wheels-windows-msys2-ucrt64
        python_version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Resolve Wheels run id
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          MANUAL_RUN_ID: ${{ github.event.inputs.wheels_run_id }}
        shell: bash
        run: |
          if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            RUN_ID="${WORKFLOW_RUN_ID}"
          elif [[ -n "${MANUAL_RUN_ID}" ]]; then
            RUN_ID="${MANUAL_RUN_ID}"
          else
            RUN_ID="$(gh run list \
              --workflow wheels.yml \
              --repo "${GITHUB_REPOSITORY}" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')"
          fi

          if [[ -z "${RUN_ID}" || "${RUN_ID}" == "null" ]]; then
            echo "Could not resolve a successful Wheels run id" >&2
            exit 1
          fi

          echo "Using Wheels run id ${RUN_ID}"
          echo "run_id=${RUN_ID}" >> "${GITHUB_OUTPUT}"

      - name: Download wheel artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          rm -rf wheelhouse
          mkdir -p wheelhouse
          gh run download "${{ steps.resolve.outputs.run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${{ matrix.os_entry.artifact }}" \
            --dir wheelhouse
          ls -la wheelhouse

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install the built wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip

          # 3.11 has no Limited API baseline to target, so it still gets its own
          # classic, version-specific wheel (cp311-cp311-*). 3.12/3.13/3.14 all
          # install the exact same cp312-abi3-* wheel - that's the whole point
          # of this workflow: prove the one file actually works, unmodified,
          # under three different interpreters, not just the one (3.12) that
          # actually built and tested it in wheels.yml.
          if [[ "${{ matrix.python_version }}" == "3.11" ]]; then
            PYTAG="cp311"
            ABITAG="cp311"
          else
            PYTAG="cp312"
            ABITAG="abi3"
          fi

          WHEEL=$(ls wheelhouse/pyoomph-*-"${PYTAG}"-"${ABITAG}"-*.whl)
          echo "Installing ${WHEEL} under Python ${{ matrix.python_version }}"
          python -m pip install "${WHEEL}"

      - name: Run pyoomph check all
        shell: bash
        run: |
          python -m pyoomph check all 2>&1 | tee check_output.log
          echo "----------------------------------------"
          if grep -q "WinError 32" check_output.log; then
            echo "::error::WinError 32 (file/DLL still in use) detected in 'pyoomph check all' output -- see check_output.log above"
            exit 1
          fi
          echo "No WinError 32 detected."

      - name: Upload check output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyoomph-check-output-${{ matrix.os_entry.label }}-cp${{ matrix.python_version }}
          path: check_output.log
          if-no-files-found: warn
