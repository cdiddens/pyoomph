name: Wheels

on:
  workflow_dispatch:
    inputs:
      prebuild_run_id:
        description: Optional prebuild workflow run id to download CLN/GiNaC artifacts from
        required: false
        type: string
  workflow_run:
    workflows:
      - Prebuild static CLN/GiNaC
    types:
      - completed

jobs:
  build_wheels:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64-cp312
            runner: ubuntu-latest
            platform: linux
            prebuild_artifact: static-ginac-cln-linux-x86_64
          - label: macos-intel-x86_64-cp312
            runner: macos-15-intel
            platform: macos
            prebuild_artifact: static-ginac-cln-macos-intel-x86_64
          - label: macos-arm64-cp312
            runner: macos-14
            platform: macos
            prebuild_artifact: static-ginac-cln-macos-arm64
          - label: windows-msys2-ucrt64-cp312
            runner: windows-latest
            platform: windows
            prebuild_artifact: static-ginac-cln-windows-msys2-ucrt64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Resolve prebuild run id
        id: prebuild
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          MANUAL_RUN_ID: ${{ github.event.inputs.prebuild_run_id }}
        shell: bash
        run: |
          if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            RUN_ID="${WORKFLOW_RUN_ID}"
          elif [[ -n "${MANUAL_RUN_ID}" ]]; then
            RUN_ID="${MANUAL_RUN_ID}"
          else
            RUN_ID="$(gh run list \
              --workflow prebuild_static_ginac_cln.yml \
              --repo "${GITHUB_REPOSITORY}" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')"
          fi

          if [[ -z "${RUN_ID}" || "${RUN_ID}" == "null" ]]; then
            echo "Could not resolve a successful prebuild run id" >&2
            exit 1
          fi

          echo "run_id=${RUN_ID}" >> "${GITHUB_OUTPUT}"

      - name: Download matching static prebuild artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          rm -rf prebuilt
          mkdir -p prebuilt
          gh run download "${{ steps.prebuild.outputs.run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${{ matrix.prebuild_artifact }}" \
            --dir prebuilt

      - name: Show downloaded artifact layout
        shell: bash
        run: |
          find prebuilt -maxdepth 5 -type d | sort
          find prebuilt -maxdepth 5 -type f | sort | head -n 200

      - name: Install build dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglu1-mesa-dev libxcursor-dev libopengl0

      - name: Build wheel with cibuildwheel (Linux/macOS)
        if: matrix.platform != 'windows'
        env:
          CIBW_BUILD: cp314-*
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS: native
          CIBW_BUILD_FRONTEND: build
          CIBW_BEFORE_ALL_LINUX: >
            bash -lc 'if command -v dnf >/dev/null 2>&1; then dnf -y install wget bzip2 patch;
            elif command -v yum >/dev/null 2>&1; then yum -y install wget bzip2 patch;
            elif command -v apk >/dev/null 2>&1; then apk add --no-cache wget bzip2 patch;
            elif command -v apt-get >/dev/null 2>&1; then apt-get update && apt-get install -y wget bzip2 patch;
            else echo "No supported package manager for before-all" >&2; exit 1; fi'
          CIBW_BEFORE_TEST_LINUX: >
            bash -lc 'if command -v dnf >/dev/null 2>&1; then dnf -y install mesa-libGLU libXcursor libglvnd-opengl libXinerama;
            elif command -v yum >/dev/null 2>&1; then yum -y install mesa-libGLU libXcursor libglvnd-opengl libXinerama;
            elif command -v apk >/dev/null 2>&1; then apk add --no-cache glu libxcursor libxinerama || apk add --no-cache mesa libxcursor libxinerama || true;
            elif command -v apt-get >/dev/null 2>&1; then apt-get update && apt-get install -y libglu1-mesa libxcursor1 libopengl0 libxinerama1;
            else echo "No supported package manager for before-test" >&2; exit 1; fi'
          CIBW_ENVIRONMENT: >
            PYOOMPH_GINAC_INCLUDE_DIR=$PWD/prebuilt/GiNaC_static/install/include
            PYOOMPH_GINAC_LIB_DIR=$PWD/prebuilt/GiNaC_static/install/lib
            PYOOMPH_CLN_INCLUDE_DIR=$PWD/prebuilt/GiNaC_static/install/include
            PYOOMPH_CLN_LIB_DIR=$PWD/prebuilt/GiNaC_static/install/lib
          CIBW_CONFIG_SETTINGS: >
            cmake.define.PYOOMPH_DOWNLOAD_CLN=OFF
            cmake.define.PYOOMPH_DOWNLOAD_GINAC=OFF
            cmake.define.PYOOMPH_USE_MPI=OFF
            cmake.define.PYOOMPH_PARANOID=OFF
        uses: pypa/cibuildwheel@v3.3.1
        with:
          output-dir: wheelhouse

      - name: Set up MSYS2
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            patch
            git
            pkgconf
            base-devel
            mingw-w64-ucrt-x86_64-toolchain

      - name: Build wheel with cibuildwheel (Windows/MSYS2)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        env:
          CC: gcc
          CXX: g++
        run: |
          export PATH="$(cygpath -u "$pythonLocation"):$PATH"
          python -m pip install --upgrade pip
          python -m pip install --upgrade cibuildwheel delvewheel

          PREBUILT_WIN="$(cygpath -m "$PWD/prebuilt/GiNaC_static/install")"

          export CIBW_BUILD="cp314-win_amd64"
          export CIBW_ARCHS="AMD64"
          export CIBW_BUILD_FRONTEND="build"
          export CIBW_ENVIRONMENT_WINDOWS="CC=gcc CXX=g++ CXXFLAGS='-static-libgcc -static-libstdc++' LDFLAGS='-static-libgcc -static-libstdc++' PYOOMPH_GINAC_INCLUDE_DIR=${PREBUILT_WIN}/include PYOOMPH_GINAC_LIB_DIR=${PREBUILT_WIN}/lib PYOOMPH_CLN_INCLUDE_DIR=${PREBUILT_WIN}/include PYOOMPH_CLN_LIB_DIR=${PREBUILT_WIN}/lib"
          export CIBW_REPAIR_WHEEL_COMMAND_WINDOWS="delvewheel repair --add-path C:/msys64/ucrt64/bin -w {dest_dir} {wheel}"
          export CIBW_CONFIG_SETTINGS="cmake.args=-GUnix\ Makefiles cmake.define.PYOOMPH_DOWNLOAD_CLN=OFF cmake.define.PYOOMPH_DOWNLOAD_GINAC=OFF cmake.define.PYOOMPH_USE_MPI=OFF cmake.define.PYOOMPH_PARANOID=OFF"

          mkdir -p wheelhouse
          python -m cibuildwheel --output-dir wheelhouse

      - name: Verify NO_MPI marker in wheel
        shell: bash
        run: |
          python - <<'PY'
          import pathlib
          import sys
          import zipfile

          wheels = sorted(pathlib.Path("wheelhouse").glob("*.whl"))
          if not wheels:
              print("No wheels found in wheelhouse", file=sys.stderr)
              sys.exit(1)

          missing = []
          for wheel in wheels:
              with zipfile.ZipFile(wheel) as zf:
                  names = set(zf.namelist())
              if "pyoomph/NO_MPI" not in names:
                  missing.append(wheel.name)

          if missing:
              print("NO_MPI marker missing in:", ", ".join(missing), file=sys.stderr)
              sys.exit(1)

          print("NO_MPI marker verified in", len(wheels), "wheel(s)")
          PY

      - name: Upload built wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.label }}
          path: wheelhouse/*.whl
          if-no-files-found: error
